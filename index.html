<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2048</title>
  <style>
    /* ===== Global Reset & Base ===== */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background-color: #faf8ef;
      color: #776e65;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 20px;
      user-select: none;
      -webkit-user-select: none;
    }

    /* ===== Container ===== */
    .container {
      max-width: 500px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ===== Title ===== */
    .title {
      font-size: 80px;
      font-weight: 700;
      color: #776e65;
      margin-bottom: 10px;
    }

    /* ===== Score Board ===== */
    .score-board {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
      width: 100%;
    }

    .score-container {
      background: #bbada0;
      border-radius: 6px;
      padding: 10px 20px;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .score-label {
      font-size: 12px;
      font-weight: 600;
      color: #eee4da;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .score-value {
      font-size: 28px;
      font-weight: 700;
      color: #fff;
    }

    /* ===== New Game Button ===== */
    .new-game-btn {
      background: #8f7a66;
      color: #f9f6f2;
      border: none;
      border-radius: 6px;
      padding: 12px 24px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 20px;
      transition: background 0.15s;
    }

    .new-game-btn:hover {
      background: #9f8b77;
    }

    /* ===== Game Container ===== */
    .game-container {
      position: relative;
      background: #bbada0;
      border-radius: 8px;
      padding: 12px;
      width: 100%;
      max-width: 420px;
      aspect-ratio: 1 / 1;
      touch-action: none;
    }

    /* ===== Grid (4x4) ===== */
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(4, 1fr);
      gap: 12px;
      width: 100%;
      height: 100%;
    }

    .grid-cell {
      background: rgba(238, 228, 218, 0.35);
      border-radius: 6px;
    }

    /* ===== Tile (rendered by JS) ===== */
    .tile {
      position: absolute;
      display: flex;
      justify-content: center;
      align-items: center;
      font-weight: 700;
      border-radius: 6px;
      transition: top 0.12s ease, left 0.12s ease;
      animation: pop 0.15s ease;
    }

    @keyframes pop {
      0% { transform: scale(0); }
      50% { transform: scale(1.15); }
      100% { transform: scale(1); }
    }

    @keyframes appear {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }

    /* ===== Tile Colors ===== */
    .tile-2    { background: #eee4da; color: #776e65; }
    .tile-4    { background: #ede0c8; color: #776e65; }
    .tile-8    { background: #f2b179; color: #f9f6f2; }
    .tile-16   { background: #f59563; color: #f9f6f2; }
    .tile-32   { background: #f67c5f; color: #f9f6f2; }
    .tile-64   { background: #f65e3b; color: #f9f6f2; }
    .tile-128  { background: #edcf72; color: #f9f6f2; font-size: 90%; }
    .tile-256  { background: #edcc61; color: #f9f6f2; font-size: 90%; }
    .tile-512  { background: #edc850; color: #f9f6f2; font-size: 90%; }
    .tile-1024 { background: #edc53f; color: #f9f6f2; font-size: 80%; }
    .tile-2048 { background: #edc22e; color: #f9f6f2; font-size: 80%; }
    .tile-super { background: #3c3a32; color: #f9f6f2; font-size: 75%; }

    /* ===== Overlay (Game Over / Win) ===== */
    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(238, 228, 218, 0.73);
      border-radius: 8px;
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 10;
    }

    .overlay.active {
      display: flex;
    }

    .overlay-content {
      text-align: center;
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .overlay-message {
      font-size: 36px;
      font-weight: 700;
      color: #776e65;
      margin-bottom: 20px;
    }

    .try-again-btn {
      background: #8f7a66;
      color: #f9f6f2;
      border: none;
      border-radius: 6px;
      padding: 12px 30px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    .try-again-btn:hover {
      background: #9f8b77;
    }

    /* ===== Hint Text ===== */
    .hint {
      margin-top: 20px;
      font-size: 14px;
      color: #776e65;
    }

    /* ===== Responsive ===== */
    @media (max-width: 520px) {
      .title {
        font-size: 50px;
      }

      .score-board {
        gap: 6px;
      }

      .score-value {
        font-size: 22px;
      }

      .game-container {
        padding: 8px;
      }

      .grid {
        gap: 8px;
      }
    }

    @media (max-width: 360px) {
      .title {
        font-size: 40px;
      }

      .hint {
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="title">2048</h1>

    <div class="score-board">
      <div class="score-container">
        <div class="score-label">SCORE</div>
        <div class="score-value" id="score">0</div>
      </div>
      <div class="score-container">
        <div class="score-label">BEST</div>
        <div class="score-value" id="best">0</div>
      </div>
    </div>

    <button class="new-game-btn" id="newGameBtn">New Game</button>

    <div class="game-container" id="gameContainer">
      <div class="grid" id="grid"></div>
      <div class="overlay" id="overlay">
        <div class="overlay-content">
          <p class="overlay-message" id="overlayMessage"></p>
          <button class="try-again-btn" id="tryAgainBtn">Try Again</button>
        </div>
      </div>
    </div>

    <p class="hint">Use <strong>arrow keys</strong> or <strong>swipe</strong> to play.</p>
  </div>

  <script>
    /**
     * 2048 Game Logic
     * - Handles grid management, tile movement, merging
     * - Score tracking with local storage for best score
     * - Keyboard (arrow keys) and touch (swipe) controls
     * - Game over detection
     */

    (function () {
      'use strict';

      // ===== Configuration =====
      const GRID_SIZE = 4;
      const CELL_GAP = 12; // Matches CSS gap value
      const CELL_PADDING = 12; // Matches CSS padding on game-container

      // ===== DOM References =====
      const gridEl = document.getElementById('grid');
      const scoreEl = document.getElementById('score');
      const bestEl = document.getElementById('best');
      const overlayEl = document.getElementById('overlay');
      const overlayMessageEl = document.getElementById('overlayMessage');
      const newGameBtn = document.getElementById('newGameBtn');
      const tryAgainBtn = document.getElementById('tryAgainBtn');
      const gameContainerEl = document.getElementById('gameContainer');

      // ===== Game State =====
      let grid = [];
      let score = 0;
      let best = parseInt(localStorage.getItem('2048_best')) || 0;
      let gameOver = false;
      let tiles = []; // Track tile elements for rendering

      // ===== Initialize =====
      bestEl.textContent = best;
      initGame();
      setupControls();

      /**
       * Initialize a new game
       */
      function initGame() {
        grid = Array.from({ length: GRID_SIZE }, () => Array(GRID_SIZE).fill(0));
        score = 0;
        gameOver = false;
        scoreEl.textContent = '0';
        overlayEl.classList.remove('active');
        tiles = [];

        // Spawn two initial tiles
        spawnTile();
        spawnTile();
        renderGrid();
      }

      /**
       * Spawn a new tile (2 or 4) at a random empty cell
       */
      function spawnTile() {
        const emptyCells = [];
        for (let r = 0; r < GRID_SIZE; r++) {
          for (let c = 0; c < GRID_SIZE; c++) {
            if (grid[r][c] === 0) emptyCells.push({ r, c });
          }
        }
        if (emptyCells.length === 0) return;

        const cell = emptyCells[Math.floor(Math.random() * emptyCells.length)];
        grid[cell.r][cell.c] = Math.random() < 0.9 ? 2 : 4;
        return cell;
      }

      /**
       * Render the grid to DOM
       */
      function renderGrid() {
        gridEl.innerHTML = '';
        tiles = [];

        // Create base cells
        for (let r = 0; r < GRID_SIZE; r++) {
          for (let c = 0; c < GRID_SIZE; c++) {
            const cell = document.createElement('div');
            cell.classList.add('grid-cell');
            cell.dataset.row = r;
            cell.dataset.col = c;
            gridEl.appendChild(cell);
          }
        }

        // Render non-zero tiles
        for (let r = 0; r < GRID_SIZE; r++) {
          for (let c = 0; c < GRID_SIZE; c++) {
            if (grid[r][c] !== 0) {
              renderTile(r, c, grid[r][c]);
            }
          }
        }
      }

      /**
       * Render a single tile element
       * @param {number} row - Grid row index
       * @param {number} col - Grid column index
       * @param {number} value - Tile value
       */
      function renderTile(row, col, value) {
        const tile = document.createElement('div');
        tile.classList.add('tile');
        tile.classList.add(getTileClass(value));
        tile.textContent = value;

        // Calculate position based on grid layout
        const containerWidth = gameContainerEl.clientWidth - CELL_PADDING * 2;
        const containerHeight = gameContainerEl.clientHeight - CELL_PADDING * 2;
        const cellSize = (containerWidth - CELL_GAP * (GRID_SIZE - 1)) / GRID_SIZE;

        tile.style.width = cellSize + 'px';
        tile.style.height = cellSize + 'px';
        tile.style.fontSize = Math.min(cellSize, 60) + 'px';
        tile.style.top = (CELL_PADDING + row * (cellSize + CELL_GAP)) + 'px';
        tile.style.left = (CELL_PADDING + col * (cellSize + CELL_GAP)) + 'px';
        tile.style.lineHeight = cellSize + 'px';
        tile.style.zIndex = value >= 1024 ? 5 : 1;

        gridEl.appendChild(tile);
        tiles.push(tile);
      }

      /**
       * Get CSS class name for a tile value
       * @param {number} value - Tile value
       * @returns {string}
       */
      function getTileClass(value) {
        if (value <= 2048) return 'tile-' + value;
        return 'tile-super';
      }

      /**
       * Move tiles in the specified direction
       * @param {string} direction - 'up', 'down', 'left', or 'right'
       * @returns {boolean} Whether any tiles moved
       */
      function move(direction) {
        if (gameOver) return false;

        let moved = false;
        let prevGrid = grid.map(function (row) { return row.slice(); });

        if (direction === 'left' || direction === 'right') {
          for (let r = 0; r < GRID_SIZE; r++) {
            let row = grid[r];
            if (direction === 'right') row = row.reverse();
            row = slideRow(row);
            if (direction === 'right') row = row.reverse();
            grid[r] = row;
          }
        } else if (direction === 'up' || direction === 'down') {
          for (let c = 0; c < GRID_SIZE; c++) {
            let col = [];
            for (let r = 0; r < GRID_SIZE; r++) col.push(grid[r][c]);
            if (direction === 'down') col = col.reverse();
            col = slideRow(col);
            if (direction === 'down') col = col.reverse();
            for (let r = 0; r < GRID_SIZE; r++) grid[r][c] = col[r];
          }
        }

        // Check if the board changed
        for (let r = 0; r < GRID_SIZE; r++) {
          for (let c = 0; c < GRID_SIZE; c++) {
            if (prevGrid[r][c] !== grid[r][c]) {
              moved = true;
              break;
            }
          }
        }

        if (moved) {
          scoreEl.textContent = score;
          spawnTile();
          renderGrid();

          // Check win (2048)
          if (checkWin()) {
            showOverlay('You Win!', true);
            return true;
          }

          // Check game over
          if (isGameOver()) {
            gameOver = true;
            showOverlay('Game Over', false);
          }
        }

        return moved;
      }

      /**
       * Slide and merge a single row (used for left / up logic)
       * @param {number[]} row - Array of values
       * @returns {number[]} The resulting row after sliding and merging
       */
      function slideRow(row) {
        // Remove zeros
        let arr = row.filter(function (v) { return v !== 0; });

        // Merge adjacent equal values
        for (let i = 0; i < arr.length - 1; i++) {
          if (arr[i] === arr[i + 1]) {
            arr[i] *= 2;
            score += arr[i];
            arr[i + 1] = 0;
            i++;
          }
        }

        // Remove zeros again after merge
        arr = arr.filter(function (v) { return v !== 0; });

        // Pad with zeros
        while (arr.length < GRID_SIZE) {
          arr.push(0);
        }

        return arr;
      }

      /**
       * Check if the player has reached 2048
       * @returns {boolean}
       */
      function checkWin() {
        for (let r = 0; r < GRID_SIZE; r++) {
          for (let c = 0; c < GRID_SIZE; c++) {
            if (grid[r][c] === 2048) return true;
          }
        }
        return false;
      }

      /**
       * Check if the game is over (no empty cells and no possible merges)
       * @returns {boolean}
       */
      function isGameOver() {
        // Check for empty cells
        for (let r = 0; r < GRID_SIZE; r++) {
          for (let c = 0; c < GRID_SIZE; c++) {
            if (grid[r][c] === 0) return false;
          }
        }

        // Check for possible merges (horizontal and vertical)
        for (let r = 0; r < GRID_SIZE; r++) {
          for (let c = 0; c < GRID_SIZE; c++) {
            if (c < GRID_SIZE - 1 && grid[r][c] === grid[r][c + 1]) return false;
            if (r < GRID_SIZE - 1 && grid[r][c] === grid[r + 1][c]) return false;
          }
        }

        return true;
      }

      /**
       * Show the game overlay (win or game over)
       * @param {string} message - Message to display
       * @param {boolean} isWin - Whether this is a win state
       */
      function showOverlay(message, isWin) {
        overlayMessageEl.textContent = message;
        overlayEl.classList.add('active');

        // Update best score if current score is higher
        if (score > best) {
          best = score;
          bestEl.textContent = best;
          localStorage.setItem('2048_best', best);
        }
      }

      /**
       * Set up keyboard and touch controls
       */
      function setupControls() {
        // Keyboard
        document.addEventListener('keydown', function (e) {
          var keyMap = {
            'ArrowUp': 'up',
            'ArrowDown': 'down',
            'ArrowLeft': 'left',
            'ArrowRight': 'right',
            'w': 'up',
            's': 'down',
            'a': 'left',
            'd': 'right'
          };

          if (keyMap[e.key]) {
            e.preventDefault();
            move(keyMap[e.key]);
          }
        });

        // Touch / swipe
        var touchStartX = 0;
        var touchStartY = 0;

        gameContainerEl.addEventListener('touchstart', function (e) {
          touchStartX = e.touches[0].clientX;
          touchStartY = e.touches[0].clientY;
        }, { passive: true });

        gameContainerEl.addEventListener('touchend', function (e) {
          var dx = e.changedTouches[0].clientX - touchStartX;
          var dy = e.changedTouches[0].clientY - touchStartY;
          var absDx = Math.abs(dx);
          var absDy = Math.abs(dy);

          if (Math.max(absDx, absDy) < 30) return; // Too small to be a swipe

          if (absDx > absDy) {
            move(dx > 0 ? 'right' : 'left');
          } else {
            move(dy > 0 ? 'down' : 'up');
          }
        }, { passive: true });

        // Buttons
        newGameBtn.addEventListener('click', initGame);
        tryAgainBtn.addEventListener('click', initGame);

        // Re-render tiles when window resizes
        window.addEventListener('resize', function () {
          renderGrid();
        });
      }
    })();
  </script>
</body>
</html>
